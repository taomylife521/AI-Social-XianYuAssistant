server.port=12400
spring.datasource.url=jdbc:sqlite:dbdata/xianyu_assistant.db

# WebSocket配置（参考Python代码）
# 心跳间隔（秒）
websocket.heartbeat-interval=15
# 心跳超时（秒）
websocket.heartbeat-timeout=5
# Token刷新间隔（秒，默认1小时）
websocket.token-refresh-interval=3600
# Token重试间隔（秒，默认5分钟）
websocket.token-retry-interval=300
# 消息过期时间（毫秒，默认5分钟）
websocket.message-expire-time=300000
# 人工接管超时（秒，默认1小时）
websocket.manual-mode-timeout=3600
# 人工接管切换关键词
websocket.toggle-keywords=。
# 模拟人工输入延迟
websocket.simulate-human-typing=false
# 连接重连延迟（秒）
websocket.reconnect-delay=5
# 最大重连次数
websocket.max-reconnect-attempts=10
# 消息发送重试次数
websocket.message-retry-attempts=3
# 消息发送重试延迟（毫秒）
websocket.message-retry-delay=1000